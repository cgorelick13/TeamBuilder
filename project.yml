name: TeamBuilder
options:
  bundleIdPrefix: com.teambuilder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  TeamBuilder:
    type: application
    platform: iOS
    sources:
      - path: TeamBuilder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.teambuilder.app
        INFOPLIST_FILE: TeamBuilder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TeamBuilder/Resources/Info.plist
      properties:
        CFBundleDisplayName: TeamBuilder
        CFBundleName: TeamBuilder
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
